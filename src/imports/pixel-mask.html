<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Mask</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 50%, rgba(33, 67, 108, 0.22), transparent 31rem),
          radial-gradient(circle at 48% 58%, rgba(97, 12, 34, 0.22), transparent 24rem),
          #030408;
        color: #fff7ec;
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        position: relative;
        width: 100vw;
        height: 100svh;
        isolation: isolate;
      }

      canvas {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        touch-action: none;
      }

      .fallback {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        left: 1rem;
        z-index: 3;
        margin: 0;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(0, 0, 0, 0.78);
        color: #ffffff;
        font-size: 0.95rem;
      }

      @media (prefers-reduced-motion: reduce) {
        canvas {
          cursor: default;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="Interactive pixel masked face with tears">
      <canvas id="pixel-flower"></canvas>
      <noscript>
        <p class="fallback">JavaScript is required for the pixel mask.</p>
      </noscript>
    </main>

    <script>
      const canvas = document.querySelector("#pixel-flower");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const image = new Image();

      const settings = {
        imageSrc: "masked-face.png",
        desktopPixelSize: 7,
        mobilePixelSize: 8,
        pixelGap: 2,
        imageScaleDesktop: 0.72,
        imageScaleMobile: 0.82,
        imageCenterXDesktop: 0.5,
        imageCenterXMobile: 0.5,
        imageCenterYDesktop: 0.55,
        imageCenterYMobile: 0.58,
        hoverRadiusDesktop: 165,
        hoverRadiusMobile: 110,
        pushStrengthDesktop: 145,
        pushStrengthMobile: 95,
        fluid: {
          speed: 1.25,
          zoom: 1.55,
          warp: 5,
          grain: 0.03,
          seed: 30,
          colorMix: 0.24,
          brightnessPulse: 0.34,
          waveContrast: 0.18,
          timeSmoothing: 0.72,
        },
      };

      const auroraPalette = [
        [16, 18, 31],
        [42, 61, 91],
        [63, 142, 181],
        [72, 195, 225],
        [238, 231, 212],
        [191, 34, 64],
        [72, 8, 22],
      ];

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        particles: [],
        pointer: {
          x: 0,
          y: 0,
          active: false,
        },
      };

      const prefersReducedMotion = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      ).matches;

      image.decoding = "async";
      image.src = settings.imageSrc;

      function getResponsiveSettings() {
        const mobile = window.innerWidth < 760;

        return {
          pixelSize: mobile ? settings.mobilePixelSize : settings.desktopPixelSize,
          pixelGap: settings.pixelGap,
          imageScale: mobile
            ? settings.imageScaleMobile
            : settings.imageScaleDesktop,
          imageCenterX: mobile
            ? settings.imageCenterXMobile
            : settings.imageCenterXDesktop,
          imageCenterY: mobile
            ? settings.imageCenterYMobile
            : settings.imageCenterYDesktop,
          hoverRadius: mobile
            ? settings.hoverRadiusMobile
            : settings.hoverRadiusDesktop,
          pushStrength: mobile
            ? settings.pushStrengthMobile
            : settings.pushStrengthDesktop,
        };
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();

        state.width = rect.width;
        state.height = rect.height;
        state.dpr = Math.min(window.devicePixelRatio || 1, 2);

        canvas.width = Math.round(state.width * state.dpr);
        canvas.height = Math.round(state.height * state.dpr);
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      }

      function createCanvas(width, height) {
        if ("OffscreenCanvas" in window) {
          return new OffscreenCanvas(width, height);
        }

        const fallbackCanvas = document.createElement("canvas");
        fallbackCanvas.width = width;
        fallbackCanvas.height = height;
        return fallbackCanvas;
      }

      function buildParticles() {
        const responsive = getResponsiveSettings();
        resizeCanvas();

        state.particles = [];

        const maxImageWidth = state.width * responsive.imageScale;
        const maxImageHeight = state.height * responsive.imageScale;
        const imageScale = Math.min(
          maxImageWidth / image.naturalWidth,
          maxImageHeight / image.naturalHeight,
        );
        const renderWidth = image.naturalWidth * imageScale;
        const renderHeight = image.naturalHeight * imageScale;
        const left = state.width * responsive.imageCenterX - renderWidth / 2;
        const top = state.height * responsive.imageCenterY - renderHeight / 2;
        const sampleWidth = Math.max(
          1,
          Math.floor(renderWidth / responsive.pixelSize),
        );
        const sampleHeight = Math.max(
          1,
          Math.floor(renderHeight / responsive.pixelSize),
        );
        const cellWidth = renderWidth / sampleWidth;
        const cellHeight = renderHeight / sampleHeight;
        const particleSize = Math.max(
          1,
          Math.min(cellWidth, cellHeight) - responsive.pixelGap,
        );
        const sampler = createCanvas(sampleWidth, sampleHeight);
        const samplerCtx = sampler.getContext("2d", {
          willReadFrequently: true,
        });

        samplerCtx.clearRect(0, 0, sampleWidth, sampleHeight);
        samplerCtx.drawImage(image, 0, 0, sampleWidth, sampleHeight);

        const pixels = samplerCtx.getImageData(
          0,
          0,
          sampleWidth,
          sampleHeight,
        ).data;

        for (let y = 0; y < sampleHeight; y += 1) {
          for (let x = 0; x < sampleWidth; x += 1) {
            const index = (y * sampleWidth + x) * 4;
            const red = pixels[index];
            const green = pixels[index + 1];
            const blue = pixels[index + 2];
            const alpha = pixels[index + 3];

            if (alpha < 45) {
              continue;
            }

            const homeX = left + x * cellWidth;
            const homeY = top + y * cellHeight;

            state.particles.push({
              x: homeX,
              y: homeY,
              homeX,
              homeY,
              nx: x / Math.max(1, sampleWidth - 1),
              ny: y / Math.max(1, sampleHeight - 1),
              size: particleSize,
              alpha: alpha / 255,
              red,
              green,
              blue,
              luma: (red * 0.299 + green * 0.587 + blue * 0.114) / 255,
              tear: smoothstep(14, 86, blue - Math.max(red * 0.72, green * 0.62)),
              phase: Math.random() * Math.PI * 2,
              speed: 0.07 + Math.random() * 0.055,
            });
          }
        }
      }

      function clamp01(value) {
        return Math.max(0, Math.min(1, value));
      }

      function smoothstep(edge0, edge1, value) {
        const amount = clamp01((value - edge0) / (edge1 - edge0));
        return amount * amount * (3 - 2 * amount);
      }

      function hash2(x, y, seed) {
        const value = Math.sin(x * 127.1 + y * 311.7 + seed * 74.7) * 43758.5453;
        return value - Math.floor(value);
      }

      function mixChannel(a, b, amount) {
        return Math.round(a + (b - a) * amount);
      }

      function paletteAt(amount) {
        const wrapped = ((amount % 1) + 1) % 1;
        const scaled = wrapped * auroraPalette.length;
        const index = Math.floor(scaled) % auroraPalette.length;
        const nextIndex = (index + 1) % auroraPalette.length;
        const blend = smoothstep(0, 1, scaled - index);
        const current = auroraPalette[index];
        const next = auroraPalette[nextIndex];

        return [
          mixChannel(current[0], next[0], blend),
          mixChannel(current[1], next[1], blend),
          mixChannel(current[2], next[2], blend),
        ];
      }

      function getFluidColor(particle, time) {
        const fluid = settings.fluid;
        const rawSeconds = time * 0.001 * fluid.speed;
        const seconds =
          rawSeconds * fluid.timeSmoothing +
          Math.sin(rawSeconds * 0.42) * (1 - fluid.timeSmoothing) * 2.5;
        const centeredX = (particle.nx - 0.5) * fluid.zoom;
        const centeredY = (particle.ny - 0.5) * fluid.zoom;
        const radius = Math.hypot(centeredX, centeredY);
        const angle = Math.atan2(centeredY, centeredX);
        const warpA = Math.sin(centeredX * fluid.warp + seconds * 1.15 + fluid.seed);
        const warpB = Math.cos(centeredY * (fluid.warp * 1.18) - seconds * 0.95);
        const spiral = Math.sin(angle * 6 + radius * 10.5 - seconds * 1.35);
        const interference =
          Math.sin((centeredX + warpB * 0.18) * 8.5 + seconds * 1.35) +
          Math.cos((centeredY + warpA * 0.16) * 9.25 - seconds * 1.05) +
          spiral;
        const grain =
          (hash2(
            Math.floor(particle.nx * 47),
            Math.floor(particle.ny * 47),
            fluid.seed + Math.floor(seconds * 18),
          ) -
            0.5) *
          fluid.grain;
        const paletteAmount =
          interference * 0.11 +
          radius * 0.58 +
          angle * 0.045 +
          seconds * 0.1 +
          grain;
        const aurora = paletteAt(paletteAmount);
        const wave =
          0.5 +
          0.5 *
            Math.sin(
              seconds * 2.1 +
                radius * 24 +
                angle * 7 +
                warpA * 1.5 +
                particle.phase,
            );
        const porcelainLift = smoothstep(0.52, 0.95, particle.luma);
        const tearLift = smoothstep(22, 92, particle.blue - particle.red);
        const redDepth = smoothstep(0.12, 0.5, 1 - particle.luma);
        const tearGlow =
          0.5 +
          0.5 *
            Math.sin(seconds * 1.6 + radius * 16 - angle * 3 + particle.phase);
        const lightFlow = 1 + (wave - 0.5) * fluid.brightnessPulse;
        const original = [particle.red, particle.green, particle.blue];
        const litOriginal = [
          Math.max(0, Math.min(255, original[0] * lightFlow + redDepth * 10 + porcelainLift * 6)),
          Math.max(
            0,
            Math.min(255, original[1] * lightFlow + porcelainLift * 9 + tearLift * tearGlow * 18),
          ),
          Math.max(
            0,
            Math.min(255, original[2] * (0.98 + (wave - 0.5) * 0.14) + tearLift * 32),
          ),
        ];
        const warmPulse =
          0.5 +
          0.5 *
            Math.sin(
              seconds * 2.2 +
                radius * 18 +
                angle * 4 +
                particle.phase * 0.35,
            );
        const brightnessLift =
          0.74 + particle.luma * 0.3 + porcelainLift * 0.1 + tearLift * 0.18;
        const waveEmphasis = 0.92 + wave * fluid.waveContrast;
        const mixAmount =
          fluid.colorMix *
          (0.35 + warmPulse * 0.65) *
          (0.35 + particle.luma * 0.65);

        return `rgb(${
          mixChannel(litOriginal[0], aurora[0] * brightnessLift * waveEmphasis, mixAmount)
        }, ${
          mixChannel(litOriginal[1], aurora[1] * brightnessLift * waveEmphasis, mixAmount)
        }, ${
          mixChannel(litOriginal[2], aurora[2] * brightnessLift * waveEmphasis, mixAmount)
        })`;
      }

      function updatePointer(event) {
        const rect = canvas.getBoundingClientRect();

        state.pointer.x = event.clientX - rect.left;
        state.pointer.y = event.clientY - rect.top;
      }

      function draw(time) {
        const responsive = getResponsiveSettings();

        ctx.clearRect(0, 0, state.width, state.height);

        for (const particle of state.particles) {
          let targetX = particle.homeX;
          let targetY = particle.homeY;

          if (state.pointer.active && !prefersReducedMotion) {
            const dx = particle.homeX - state.pointer.x;
            const dy = particle.homeY - state.pointer.y;
            const distance = Math.hypot(dx, dy);

            if (distance < responsive.hoverRadius) {
              const force = (1 - distance / responsive.hoverRadius) ** 2;
              const angle = Math.atan2(dy, dx);

              targetX += Math.cos(angle) * responsive.pushStrength * force;
              targetY += Math.sin(angle) * responsive.pushStrength * force;
            }
          }

          if (particle.tear > 0.04 && !prefersReducedMotion) {
            const stream = Math.sin(time * 0.0024 + particle.phase + particle.nx * 18);

            targetX += stream * particle.tear * 2.2;
            targetY += particle.tear * 6;
          }

          particle.x += (targetX - particle.x) * particle.speed;
          particle.y += (targetY - particle.y) * particle.speed;

          const shimmer =
            0.9 +
            Math.sin(
              time * 0.004 * settings.fluid.speed +
                particle.phase +
                particle.nx * 9 +
                particle.ny * 11,
            ) *
              0.1;

          const tearGlint =
            particle.tear *
            (0.25 +
              0.75 *
                Math.max(
                  0,
                  Math.sin(time * 0.006 * settings.fluid.speed + particle.phase),
                ));
          const drawHeight = particle.size * (1 + particle.tear * (1.15 + tearGlint * 1.4));

          ctx.globalAlpha = particle.alpha * Math.min(1, shimmer + tearGlint * 0.28);
          ctx.fillStyle =
            particle.tear > 0.04
              ? `rgb(${Math.round(95 + tearGlint * 80)}, ${Math.round(
                  190 + tearGlint * 52,
                )}, ${Math.round(235 + tearGlint * 20)})`
              : getFluidColor(particle, time);
          ctx.fillRect(particle.x, particle.y, particle.size, drawHeight);

          if (particle.tear > 0.22 && !prefersReducedMotion) {
            const tearTime = time * 0.0007 * settings.fluid.speed;
            const fallCycle = (tearTime + particle.phase * 0.19 + particle.ny * 1.15) % 1;
            const fallEase = fallCycle * fallCycle * (3 - 2 * fallCycle);
            const trailY = particle.homeY + particle.tear * (18 + fallEase * 150);
            const trailX =
              particle.homeX +
              Math.sin(time * 0.0022 + particle.phase + particle.nx * 18) *
                particle.tear *
                4;

            ctx.globalAlpha = particle.alpha * particle.tear * 0.34;
            ctx.fillStyle = "rgb(88, 190, 235)";
            ctx.fillRect(
              trailX + particle.size * 0.22,
              trailY,
              Math.max(1, particle.size * 0.56),
              particle.size * (2.8 + particle.tear * 4.2),
            );
          }
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }

      canvas.addEventListener("pointerenter", (event) => {
        state.pointer.active = true;
        updatePointer(event);
      });

      canvas.addEventListener("pointermove", updatePointer);

      canvas.addEventListener("pointerleave", () => {
        state.pointer.active = false;
      });

      let resizeTimer;

      window.addEventListener("resize", () => {
        window.clearTimeout(resizeTimer);
        resizeTimer = window.setTimeout(buildParticles, 120);
      });

      image.addEventListener("load", () => {
        buildParticles();
        requestAnimationFrame(draw);
      });

      image.addEventListener("error", () => {
        resizeCanvas();
        ctx.fillStyle = "#ffffff";
        ctx.font = "16px Arial, sans-serif";
        ctx.fillText(`Could not load ${settings.imageSrc}`, 24, 32);
      });
    </script>
  </body>
</html>
