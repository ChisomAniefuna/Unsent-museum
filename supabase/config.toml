# Supabase CLI project config. Generated by hand because we are not running a
# local Supabase stack — this project only uses the CLI to push migrations to
# the hosted project (jgdlnwvgtipiiolfzqaz). After `supabase login` and
# `supabase link --project-ref jgdlnwvgtipiiolfzqaz`, `supabase db push` will
# apply every file in supabase/migrations/ that the remote does not yet have.

project_id = "jgdlnwvgtipiiolfzqaz"

[db]
# Schema(s) that supabase db diff / db pull will inspect when generating
# follow-up migrations. The public schema is where the artifacts table lives.
schemas = ["public"]
